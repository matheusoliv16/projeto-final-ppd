services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: ppd-rabbitmq
    hostname: ppd-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ppd
      RABBITMQ_DEFAULT_PASS: ppd123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  rabbitmq_data:
